models:
  - name: stg_beamlines__archive_files
    description: >
      Each record defines a file on the archive system
    columns:
      - name: instrument_dir
        data_tests:
          - not_null
      - name: cycle_dir
        data_tests:
          - not_null
      - name: file_name
        data_tests:
          - not_null
      - name: file_ext
        data_tests:
          - not_null
      - name: file_bytes
        data_tests:
          - not_null

  - name: stg_beamlines__journal_nxentries
    description: >
      Each record captures a run entry from the journal files generated by the
      control system.

  - name: stg_beamlines__monitor_peaks
    description: >
      Each record defines a fit over a peak in the incident for a given beamline
      and experiment run.
    columns:
      - name: beamline
        data_tests:
          - not_null
      - name: run_number
        data_tests:
          - not_null
      - name: run_start
        data_tests:
          - not_null
      - name: proton_charge
        data_tests:
          - not_null
      - name: peak_centre
        data_tests:
          - not_null
      - name: peak_centre_error
        data_tests:
          - not_null
      - name: peak_amplitude
        data_tests:
          - not_null
      - name: peak_amplitude_error
        data_tests:
          - not_null
      - name: peak_sigma
        data_tests:
          - not_null
      - name: peak_sigma_error
        data_tests:
          - not_null
