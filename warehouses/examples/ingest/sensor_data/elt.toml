[job]
name = "sensor_data"
domain = "examples"
warehouse = "examples"

[extract]
entrypoint = "sensor_data:extract"

[[tables]]
name = "readings"
write_mode = "merge"
merge_on = ["sensor_id", "timestamp"]

[tables.partition]
timestamp = "month"

[[tables]]
name = "events"
write_mode = "append"

[tables.partition]
occurred_at = "year"

[transform]
dbt_dir = "warehouses/examples/transform"
dbt_select = "models/staging/sensor_data"
