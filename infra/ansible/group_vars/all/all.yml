---
base_additional_apt_keys:
  - url: https://dl.igtf.net/distribution/igtf/current/GPG-KEY-EUGridPMA-RPM-4
    filename: eugridpma-rpm-4.asc
base_timezone: "Europe/London"

cephfs_mount_export_path: "{{ secrets_cephfs['export_path'] }}"
cephfs_mount_mount_path: "/mnt/lakehouse_data"
cephfs_mount_access_name: "{{ secrets_cephfs['access_name'] }}"
cephfs_mount_access_secret: "{{ secrets_cephfs['access_secret'] }}"

docker_daemon_options:
  mtu: 1450
  registry-mirrors: ["https://dockerhub.stfc.ac.uk"]

docker_users:
  - ubuntu

elt_threads: 16

ldap_server: "{{ secrets_stfc['ldap_server'] }}"

logrotate_frequency: weekly
logrotate_keep: 30
logrotate_compress: true

keycloak_base_path: /auth
keycloak_http_port: 8080
keycloak_http_management_port: 9000
keycloak_url: "https://{{ top_level_domain }}{{ keycloak_base_path }}"
keycloak_realm:
  name: "isis-analytics-data-platform"
  display_name: "ISIS Analytics Data Platform"
keycloak_realm_url: "{{ keycloak_url }}/realms/{{ keycloak_realm.name }}"
keycloak_bootstrap:
  admin_user: "temp-admin"
  admin_password: "{{ secrets_keycloak['bootstrap_admin_password'] }}"
keycloak_local_admin:
  user: "{{ secrets_keycloak['master_local_admin_user'] }}"
  password: "{{ secrets_keycloak['master_local_admin_password'] }}"


lakekeeper_base_path: /iceberg
lakekeeper_bucket_prefix: isis-adp-warehouse-
lakekeeper_http_port: 8181

pip_install_packages:
  - name: docker
    extra_args: --break-system-packages

stfc_ldap_server: "{{ secrets_stfc['ldap_server'] }}"
stfc_ca_cert: "{{ secrets_stfc['ca_cert'] }}"

superset_farm_url_prefix: /workspace

trino_http_port: 8060
trino_https_port: 8443

# Warehouses
dbt_common_exclude: "--exclude 'resource_type:unit_test' --exclude 'resource_type:test'"
lakekeeper_project_name: "ISIS Analytics Data Platform"
lakekeeper_catalog:
  catalog_uri: "https://{{ top_level_domain }}{{ lakekeeper_base_path }}/catalog"
  warehouses:
    facility_ops_landing:
      storage:
        bucket_name: "{{ lakekeeper_bucket_prefix }}facility-ops-landing-iceberg"
        key_prefix: ""
      elt_jobs:
        github_org: ISISNeutronMuon
        github_repo: analytics-data-platform
        dbt_common_args: "--profile remote"
        sources:
          - name: moderator_performance
            hour: 3
            minute: 33
            ingest_script: warehouses/facility_ops_landing/ingest/beamlines/moderator_performance/moderator_performance.py
            dbt_args: "--select 'models/staging/beamlines/*moderator_performance*+' {{ dbt_common_exclude }}"
            state: absent
          - name: statusdisplay
            hour: 3
            minute: 45
            ingest_script: warehouses/facility_ops_landing/ingest/accelerator/statusdisplay/statusdisplay.py
            dbt_args: "--select 'models/staging/accelerator/*statusdisplay*+' {{ dbt_common_exclude }}"
          - name: accelerator_sharepoint
            hour: 4
            minute: 2
            ingest_script: warehouses/facility_ops_landing/ingest/accelerator/accelerator_sharepoint/accelerator_sharepoint.py
            dbt_args: "--select 'models/staging/accelerator/*accelerator_sharepoint*+' {{ dbt_common_exclude }}"
          - name: opralogweb
            hour: 4
            minute: 11
            ingest_script: warehouses/facility_ops_landing/ingest/accelerator/opralogweb/opralogweb.py
            dbt_args: "--select 'models/staging/accelerator/*opralogweb*+' {{ dbt_common_exclude }}"
          - name: electricity_sharepoint
            hour: "*"
            minute: 5
            ingest_script: warehouses/facility_ops_landing/ingest/estates/electricity_sharepoint/electricity_sharepoint.py
            dbt_args: "--select 'models/staging/estates/*electricity_sharepoint*+'"
        transform_catalog: facility_ops
        maintenance:
          state: present
    facility_ops:
      storage:
        bucket_name: "{{ lakekeeper_bucket_prefix }}facility-ops"
        key_prefix: ""
      elt_jobs:
        github_org: ISISNeutronMuon
        github_repo: analytics-data-platform
        transform_catalog: facility_ops
        maintenance:
          state: present

superset_farm_instances:
  accelerator:
    app_root: "{{ superset_farm_url_prefix }}/accelerator"
    env_name: production
    flask_debug: false
    http_port: 8088
    redis_db: 0
    application_db:
      host: "{{ managed_db.host }}"
      port: "{{ managed_db.port }}"
      name: "{{ secrets_superset_accelerator['db_name'] }}"
      user: "{{ secrets_superset_accelerator['db_user'] }}"
      password: "{{ secrets_superset_accelerator['db_password'] }}"
    secret_key: "{{ secrets_superset_accelerator['secret_key'] }}"
    users_yaml: "{{ secrets_superset_farm_users_yaml['accelerator'] | from_yaml }}"
    analytic_dbs:
      - name: facility_ops
        db_url: "trino://superset:{{ secrets_trino_users['superset'] }}@{{ top_level_domain }}:{{ trino_https_port }}/facility_ops"
