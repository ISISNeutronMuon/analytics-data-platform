---
base_additional_apt_keys:
  - url: https://dl.igtf.net/distribution/igtf/current/GPG-KEY-EUGridPMA-RPM-4
    filename: eugridpma-rpm-4.asc
base_timezone: "Europe/London"

cephfs_mount_export_path: "{{ vault_cephfs_export_path }}"
cephfs_mount_mount_path: "/mnt/lakehouse_data"
cephfs_mount_access_name: "{{ vault_cephfs_access_name }}"
cephfs_mount_access_secret: "{{ vault_cephfs_access_secret }}"

docker_daemon_options:
  mtu: 1450
  registry-mirrors: ["https://dockerhub.stfc.ac.uk"]

docker_users:
  - "{{ vault_openstack_vm_user }}"

elt_threads: 16

logrotate_frequency: weekly
logrotate_keep: 30
logrotate_compress: true

keycloak_base_path: /auth
keycloak_http_port: 8080
keycloak_http_management_port: 9000
keycloak_url: "https://{{ top_level_domain }}{{ keycloak_base_path }}"
keycloak_realm:
  name: "isis-analytics-data-platform"
  display_name: "ISIS Analytics Data Platform"
keycloak_realm_url: "{{ keycloak_url }}/realms/{{ keycloak_realm.name }}"

lakekeeper_base_path: /iceberg
lakekeeper_http_port: 8181

pip_install_packages:
  - name: docker
    extra_args: --break-system-packages

stfc_ldap_server: "{{ vault_stfc_ldap_server }}"
stfc_ca_cert: "{{ vault_stfc_ca_cert }}"

superset_farm_url_prefix: /workspace

trino_http_port: 8060
trino_https_port: 8443

# Warehouses
lakekeeper_project_name: "ISIS Analytics Data Platform"
lakekeeper_catalog:
  catalog_uri: "https://{{ top_level_domain }}{{ lakekeeper_base_path }}/catalog"
  warehouses:
    facility_ops:
      storage:
        bucket_name: "{{ lakekeeper_bucket_prefix }}facility-ops"
        key_prefix: ""
      elt_jobs:
        github_org: ISISNeutronMuon
        github_repo: analytics-data-platform
        dbt_common_args: "--profile remote"
        sources:
          - name: moderator_performance
            hour: 3
            minute: 33
            ingest_script: warehouses/facility_ops/ingest/beamlines/moderator_performance/moderator_performance.py
            dbt_args: "--select '+models/marts/beamlines'"
            state: absent
          - name: statusdisplay
            hour: 3
            minute: 45
            ingest_script: warehouses/facility_ops/ingest/accelerator/statusdisplay/statusdisplay.py
            dbt_args: "--select 'models/staging/accelerator/statusdisplay'"
          - name: accelerator_sharepoint
            hour: 4
            minute: 2
            ingest_script: warehouses/facility_ops/ingest/accelerator/accelerator_sharepoint/accelerator_sharepoint.py
            dbt_args: "--select 'models/staging/accelerator/accelerator_sharepoint'"
          - name: opralogweb
            hour: 4
            minute: 11
            ingest_script: warehouses/facility_ops/ingest/accelerator/opralogweb/opralogweb.py
            dbt_args: "--select '+models/marts/accelerator' --exclude '+models/marts/accelerator/power_consumption.sql'"
          - name: electricity_sharepoint
            hour: "*"
            minute: 5
            ingest_script: warehouses/facility_ops/ingest/accelerator/electricity_sharepoint/electricity_sharepoint.py
            dbt_args: "--select '+models/marts/accelerator/power_consumption.sql'"
        transform_dir: warehouses/facility_ops/transform
        maintenance:
          state: present
    accelerator_ops:
      storage:
        bucket_name: "{{ lakekeeper_bucket_prefix }}accelerator-ops"
        key_prefix: ""
      elt_jobs:
        github_org: ISISNeutronMuon
        github_repo: analytics-data-platform
        dbt_common_args: "--profile remote"
        sources:
          - name: statusdisplay
            hour: 1
            minute: 45
            ingest_script: warehouses/accelerator_ops/extract_load/statusdisplay/extract_and_load.py
            dbt_args: "--select 'models/staging/statusdisplay'"
            state: absent
          - name: accelerator_sharepoint
            hour: 2
            minute: 2
            ingest_script: warehouses/accelerator_ops/extract_load/accelerator_sharepoint/extract_and_load.py
            dbt_args: "--select 'models/staging/accelerator_sharepoint'"
            state: absent
          - name: opralogweb
            hour: 2
            minute: 11
            ingest_script: warehouses/accelerator_ops/extract_load/opralogweb/extract_and_load.py
            dbt_args: "--select '+models/operations' --exclude '+models/operations/power_consumption.sql'"
            state: absent
          - name: electricity_sharepoint
            hour: "*"
            minute: 5
            ingest_script: warehouses/accelerator_ops/extract_load/electricity_sharepoint/extract_and_load.py
            dbt_args: "--select '+models/operations/power_consumption.sql'"
            state: absent
        transform_dir: warehouses/accelerator_ops/transform
        maintenance:
          state: absent

superset_farm_instances:
  accelerator:
    app_root: "{{ superset_farm_url_prefix }}/accelerator"
    env_name: production
    flask_debug: false
    http_port: 8088
    redis_db: 0
    secret_key: "{{ vault_superset_secret_keys['accelerator'] }}"
    users_yaml: "{{ vault_superset_users_yaml['accelerator'] }}"
    analytic_dbs:
      - name: accelerator_ops
        db_url: "trino://superset:{{ vault_trino_users['superset'].password }}@{{ top_level_domain }}:{{ trino_https_port }}/accelerator_ops"
      - name: facility_ops
        db_url: "trino://superset:{{ vault_trino_users['superset'].password }}@{{ top_level_domain }}:{{ trino_https_port }}/facility_ops"
  experiment_ops:
    app_root: "{{ superset_farm_url_prefix }}/experiment_ops"
    env_name: production
    flask_debug: false
    http_port: 8089
    redis_db: 1
    secret_key: "{{ vault_superset_secret_keys['experiment_ops'] }}"
    users_yaml: "{{ vault_superset_users_yaml['experiment_ops'] }}"
    analytic_dbs:
      - name: facility_ops
        db_url: "trino://superset:{{ vault_trino_users['superset'].password }}@{{ top_level_domain }}:{{ trino_https_port }}/facility_ops"
